name: Lean Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lean
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: Coh
          use-mathlib-cache: true

      - name: Build core modules (V1, V2)
        run: |
          cd Coh
          lake build Coh.V1.Coh Coh.V2.Primitive Coh.V2.Definitions Coh.V2.Axioms Coh.V2.Analytic Coh.V2.Certified Coh.V2.Category Coh.V2.FiniteWord Coh.V2.BridgeLemmas Coh.V2.FromV1 Coh.V2.Geometry Coh.V2.VerifierPredicates Coh.V2.CostBridge

      - name: Build finite word tests
        run: |
          cd Coh
          lake build FiniteWordTests
          lake run_exe FiniteWordTests

      - name: Check for sorries
        run: |
          cd Coh
          echo "Scanning for unfinished proofs (sorry)..."
          if grep -r "sorry" Coh; then
            echo "Error: Found 'sorry' in formalization. Build failed."
            exit 1
          else
            echo "No 'sorry' found."
          fi