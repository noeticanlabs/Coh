name: Lean Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lean
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: Coh

      - name: Build project
        run: |
          cd Coh
          lake build

      - name: Formal tests
        run: |
          cd Coh
          echo "Running formal regression tests..."
          lake build FiniteWordTests
          echo "Tests passed!"

      - name: Check for sorries
        run: |
          cd Coh
          echo "Scanning for unfinished proofs (sorry)..."
          if grep -r "sorry" Coh/Coh; then
            echo "Error: Found 'sorry' in core modules. Build failed."
            exit 1
          else
            echo "No 'sorry' found in core modules."
          fi