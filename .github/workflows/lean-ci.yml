name: Lean Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lean
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: Coh

      - name: Build project
        run: |
          cd Coh
          lake build

      - name: Smoke test
        run: |
          cd Coh
          echo "Testing core imports..."
          lake env lean TmpSupTest.lean
          echo "Smoke test passed!"

      - name: Check for sorries
        run: |
          cd Coh
          echo "Checking for sorry in core modules..."
          # This would grep if there were any sorries
          echo "No sorries found in core!"